# ellmos-homebase-mcp configuration
# Copy to ~/.homebase/homebase.toml and adjust.

[server]
name = "ellmos-homebase"
# Tool metadata language: en, de, es, zh, ja, ru
language = "en"
# host/port only matter for future SSE transport, not stdio
# host = "localhost"
# port = 8090

[modules]
# Phase 1 modules
enabled = ["mem", "route", "kb", "swarm", "state", "garden", "api", "test"]
# Phase 2 modules are skipped automatically when dependencies are missing.
# enabled = ["mem", "route", "kb", "swarm", "state", "garden", "api", "test", "auto", "conn", "plug"]

# --- Memory ---
[mem]
db_path = "~/.homebase/memory.db"

# --- Routing ---
[route]
providers = ["ollama"]                          # Available: ollama, anthropic, openai, google
default_provider = "ollama"
ollama_endpoint = "http://localhost:11434"
# anthropic_api_key = "$ANTHROPIC_API_KEY"      # Use environment variables for secrets.
# openai_api_key = "$OPENAI_API_KEY"

# --- Knowledge ---
[kb]
db_path = "~/.homebase/knowledge.db"

# --- Swarm ---
[swarm]
backend = "ollama"                              # LLM backend for swarm agents
endpoint = "http://localhost:11434"
model = "qwen3.5:35b-a3b"
max_workers = 3

# --- State ---
[state]
db_path = "~/.homebase/rinnsal.db"

# --- Garden ---
[garden]
db_path = "~/.homebase/garden.db"

# --- API Exploration ---
[api]
db_path = "~/.homebase/probes.db"
timeout = 10                                    # HTTP timeout in seconds

# --- Self-Testing ---
[test]
test_root = "~/.homebase/tests/"

# --- Phase 2: Automation ---
# [auto]
# chains_dir = "~/.homebase/chains/"
# backend = "ollama"
# endpoint = "http://localhost:11434"

# --- Phase 2: Connectors ---
# [conn]
# telegram_token = "$TELEGRAM_BOT_TOKEN"
# discord_token = "$DISCORD_BOT_TOKEN"

# --- Phase 2: Plugins ---
# [plug]
