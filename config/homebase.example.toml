# ellmos-homebase-mcp configuration
# Copy to ~/.homebase/homebase.toml and adjust.

[server]
name = "ellmos-homebase"
# Tool metadata language: en, de, es, zh, ja, ru
language = "en"
# host/port only matter for future SSE transport, not stdio
# host = "localhost"
# port = 8090

[modules]
# Credential-free alpha modules
enabled = ["mem", "route", "kb", "swarm", "state", "garden", "api", "test", "conn", "auto", "plug"]

# --- Memory ---
[mem]
db_path = "~/.homebase/memory.db"

# --- Routing ---
[route]
providers = ["ollama"]                          # Available: ollama, anthropic, openai, google
default_provider = "ollama"
ollama_endpoint = "http://localhost:11434"
# anthropic_api_key = "$ANTHROPIC_API_KEY"      # Use environment variables for secrets.
# openai_api_key = "$OPENAI_API_KEY"

# --- Knowledge ---
[kb]
db_path = "~/.homebase/knowledge.db"

# --- Swarm ---
[swarm]
backend = "ollama"                              # LLM backend for swarm agents
endpoint = "http://localhost:11434"
model = "qwen3.5:35b-a3b"
max_workers = 3

# --- State ---
[state]
db_path = "~/.homebase/rinnsal.db"

# --- Garden ---
[garden]
db_path = "~/.homebase/garden.db"

# --- API Exploration ---
[api]
db_path = "~/.homebase/probes.db"
timeout = 10                                    # HTTP timeout in seconds

# --- Self-Testing ---
[test]
test_root = "~/.homebase/tests/"

# --- Automation ---
[auto]
db_path = "~/.homebase/automation.db"
chains_dir = "~/.homebase/chains/"
# Runs are recorded as local plans until real backends are explicitly configured.
# chains = [{ name = "care", description = "Inspect, patch, test", steps = ["inspect", "patch", "test"] }]

# --- Connectors ---
[conn]
db_path = "~/.homebase/connectors.db"
connectors = ["local"]
# Additional connector names are local queue profiles until real backends are explicitly configured.
# connectors = ["local", "telegram", "discord"]
# telegram_token = "$TELEGRAM_BOT_TOKEN"
# discord_token = "$DISCORD_BOT_TOKEN"

# --- Plugins ---
[plug]
db_path = "~/.homebase/plugins.db"
plugins_dir = "~/.homebase/plugins/"
# Plugin execution is disabled in alpha; `hb_plug_run` records a dry-run only.
