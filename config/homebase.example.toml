# ellmos-homebase-mcp configuration
# Copy to ~/.homebase/homebase.toml and adjust.

[server]
name = "ellmos-homebase"
# Tool metadata language: en, de, es, zh, ja, ru
language = "en"
# host/port only matter for future SSE transport, not stdio
# host = "localhost"
# port = 8090

[modules]
# Credential-free alpha modules
enabled = ["mem", "route", "kb", "swarm", "state", "garden", "api", "test", "conn", "auto", "plug"]

# --- Engine seams (see KONZEPT.md "Engine Seams") ---
# "bundled" (default) = zero-dependency built-in SQLite implementation, always works.
# "canonical" = delegate to the real Gardener/Rinnsal engine when it can be found on disk
# (checked via HOMEBASE_ENGINE_<NAME>_PATH env var, then the `path` below, then this
# module catalog first, then the ecosystem's current .AI/.MODULES/.MEMORY/*
# and legacy .AI/.MEMORY/* and .AI/.OS/*
# locations). Set ELLMOS_MODULES_CATALOG to override the catalog location.
# Falls back to bundled (logged) if no canonical engine can be found.
# hb_garden_* (Gardener), hb_state_task_* (Rinnsal) and hb_mem_* (USMC) have a
# canonical seam; hb_kb_*/hb_route_* stay bundled-only even if canonical is requested.
[engines]
mode = "bundled"

# [engines.garden]
# mode = "canonical"
# path = "~/OneDrive/.TOPICS/.AI/.MODULES/.MEMORY/GARDENER"

# [engines.state]
# mode = "canonical"
# path = "~/OneDrive/.TOPICS/.AI/.OS/rinnsal"

# [engines.mem]
# mode = "canonical"   # hb_mem_store/query/context delegate to the real USMC store
# path = "~/OneDrive/.TOPICS/.AI/.MODULES/.MEMORY/USMC"
# Notes on canonical mem: USMC has no free-text search (query filters facts
# client-side), homebase's category is kept in the fact key, and hb_mem_merge/
# hb_mem_consolidate are bundled-only (report not_supported under canonical).

# --- Memory ---
[mem]
db_path = "~/.homebase/memory.db"                 # bundled store (ignored when [engines.mem].mode = "canonical")
# usmc_db = "~/.usmc/usmc_memory.db"              # optional canonical USMC DB path; default = USMC's own store
# Optional default writer identity. Per-call `agent_id` wins; otherwise HOMEBASE_AGENT_ID/AGENT_ID wins.
# agent_id = "codex"

# --- Routing ---
[route]
providers = ["ollama"]                          # Available: ollama, anthropic, openai, google
default_provider = "ollama"
ollama_endpoint = "http://localhost:11434"
# anthropic_api_key = "$ANTHROPIC_API_KEY"      # Use environment variables for secrets.
# openai_api_key = "$OPENAI_API_KEY"

# --- Knowledge ---
[kb]
db_path = "~/.homebase/knowledge.db"
# agent_id = "codex"

# --- Swarm ---
[swarm]
backend = "ollama"                              # LLM backend for swarm agents
endpoint = "http://localhost:11434"
model = "qwen3.5:35b-a3b"
max_workers = 3

# --- State ---
[state]
db_path = "~/.homebase/rinnsal.db"              # used by hb_state_mem_* (always bundled)
# agent_id = "codex"
# task_db_path override for canonical hb_state_task_* (default: ~/.rinnsal/scanner_tasks.db,
# or $SCANNER_TASKS_DB if set). Only used when [engines.state].mode = "canonical".
# task_db_path = "~/.rinnsal/scanner_tasks.db"

# --- Garden ---
[garden]
db_path = "~/.homebase/garden.db"

# --- API Exploration ---
[api]
db_path = "~/.homebase/probes.db"
timeout = 10                                    # HTTP timeout in seconds

# --- Self-Testing ---
[test]
test_root = "~/.homebase/tests/"

# --- Automation ---
[auto]
db_path = "~/.homebase/automation.db"
chains_dir = "~/.homebase/chains/"
# Runs are recorded as local plans until real backends are explicitly configured.
# chains = [{ name = "care", description = "Inspect, patch, test", steps = ["inspect", "patch", "test"] }]

# --- Connectors ---
[conn]
db_path = "~/.homebase/connectors.db"
connectors = ["local"]
# Additional connector names are local queue profiles until real backends are explicitly configured.
# connectors = ["local", "telegram", "discord"]
# telegram_token = "$TELEGRAM_BOT_TOKEN"
# discord_token = "$DISCORD_BOT_TOKEN"

# --- Plugins ---
[plug]
db_path = "~/.homebase/plugins.db"
plugins_dir = "~/.homebase/plugins/"
# Plugin execution is disabled in alpha; `hb_plug_run` records a dry-run only.
